name: Publish to PyPI

# Publica no PyPI ao criar uma Release no GitHub, ou manualmente pelo botão
# "Run workflow" (workflow_dispatch).
#
# Usa Trusted Publishing (OIDC) — NÃO precisa de token/secret. Pré-requisito:
# configurar um "pending publisher" no PyPI para o projeto `smsgo`, apontando
# para este repositório + workflow `publish.yml` + environment `pypi`.
# Guia: https://docs.pypi.org/trusted-publishers/
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
